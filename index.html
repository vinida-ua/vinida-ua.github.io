<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vinida — меблі на замовлення</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
}

header {
  background: #1f1f1f;
  color: white;
  padding: 40px;
  text-align: center;
}

.container {
  padding: 20px;
}

.product {
  background: white;
  margin: 20px auto;
  padding: 20px;
  border-radius: 10px;
  max-width: 600px;
}

.product img {
  width: 100%;
  border-radius: 10px;
}

.btn {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 15px;
  background: #0077ff;
  color: white;
  text-decoration: none;
  border-radius: 6px;
}
</style>
</head>

<body>

<header>
  <h1>Vinida</h1>
  <p>Меблі на замовлення</p>
</header>

<div class="container">

<div class="product">
  <h2>Шафа 2000×900×450</h2>
  <img src="https://via.placeholder.com/600x400">
  <p>3 варіанти: полиці / труба / комбінована</p>
</div>

<div class="product">
  <h2>Пенал 2000×400×450</h2>
  <img src="https://via.placeholder.com/600x400">
  <p>Лівий / правий варіант, різні кольори</p>
</div>

<div class="product">
  <h2>Контакти</h2>
  <p>Телефон: +380...</p>
  <a class="btn" href="#">Написати в Telegram</a>
</div>

</div>

</body>
</html>
